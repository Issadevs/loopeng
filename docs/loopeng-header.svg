<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 340" width="1100" height="340" role="img" aria-label="loopEng">
  <defs>
    <radialGradient id="glow" cx="32%" cy="22%" r="60%">
      <stop offset="0%" stop-color="#d6a35c" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#d6a35c" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#d6a35c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- backdrop -->
  <rect x="1" y="1" width="1098" height="338" rx="28" fill="#0c0c0d" stroke="#221f1a" stroke-width="2"/>
  <rect x="1" y="1" width="1098" height="338" rx="28" fill="url(#glow)"/>

  <!-- the loop: a dashed orbit around the critter, with an arrowhead to show it
       runs on its own — the "loop" in loopEng -->
  <g transform="translate(233,164)">
    <circle r="118" fill="none" stroke="#8fae7e" stroke-opacity="0.28" stroke-width="3"
            stroke-linecap="round" stroke-dasharray="6 14" transform="rotate(-20)"/>
    <!-- arrowhead riding the orbit (top-right), pointing clockwise -->
    <polygon points="0,-7 13,0 0,7" fill="#8fae7e" fill-opacity="0.7"
             transform="translate(83,-83) rotate(45)"/>
  </g>

  <!-- the loopEng critter (vector, so it renders identically on GitHub) -->
  <g transform="translate(150,86)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- ears -->
    <polyline points="30,48 48,18 66,48" stroke="#c9c5bd" stroke-width="7"/>
    <polyline points="100,48 118,18 136,48" stroke="#c9c5bd" stroke-width="7"/>
    <!-- face sides (the parentheses) -->
    <path d="M 34,60 Q 16,96 34,132" stroke="#8a8473" stroke-width="5"/>
    <path d="M 132,60 Q 150,96 132,132" stroke="#8a8473" stroke-width="5"/>
    <!-- eyes (amber, glossy) -->
    <circle cx="62" cy="88" r="14" fill="#d6a35c"/>
    <circle cx="104" cy="88" r="14" fill="#d6a35c"/>
    <circle cx="57" cy="83" r="4.5" fill="#0c0c0d"/>
    <circle cx="99" cy="83" r="4.5" fill="#0c0c0d"/>
    <!-- eye glints -->
    <circle cx="66" cy="92" r="2" fill="#e8b96f"/>
    <circle cx="108" cy="92" r="2" fill="#e8b96f"/>
    <!-- mouth (ω) -->
    <path d="M 72,104 Q 79,116 83,105 Q 87,116 94,104" stroke="#e8b96f" stroke-width="4.5"/>
    <!-- feet (┗┛ ┗┛) -->
    <rect x="52" y="144" width="20" height="13" rx="3.5" fill="#c9c5bd"/>
    <rect x="94" y="144" width="20" height="13" rx="3.5" fill="#c9c5bd"/>
  </g>

  <!-- wordmark: loop (amber) + Eng (green) = loop engineering -->
  <text x="470" y="170" font-family="Georgia, 'Times New Roman', serif" font-size="118">
    <tspan fill="#e8b96f">loop</tspan><tspan fill="#8fae7e">Eng</tspan>
  </text>
  <text x="476" y="222" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="21" fill="#8a8473" letter-spacing="0.5">what you do by hand, as tools your agents call.</text>
</svg>
