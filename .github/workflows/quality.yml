name: quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  root:
    name: root package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: npm audit

  site:
    name: site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm audit
